# 复制本文件为 application-local.yaml（同目录），填入真实密钥。
# application-local.yaml 已被 .gitignore 忽略，启动时会自动加载（无需设置 profile）。

app:
  jwt:
    secret: your-jwt-secret-at-least-32-characters-long
  llm:
    # 按顺序兜底：mimo -> deepseek -> dashscope
    providers:
      - provider: mimo
        api-key: your-mimo-api-key
        # base-url: https://api.xiaomimimo.com/v1
        # model: mimo-v2-flash
      - provider: deepseek
        api-key: your-deepseek-api-key
        # base-url: https://api.deepseek.com
        # model: deepseek-v4-flash
      - provider: dashscope
        api-key: sk-your-dashscope-key
        # base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
        # model: qwen3.7-plus
  email:
    dev-mode: true
    dev-code: "123456"
    resend:
      api-key: re_your_resend_api_key
      from: EasyTrans <onboarding@resend.dev>

  # billing.enabled=false → 基础版免费；true → 必须购买 products 中的基础版后才能翻译
  billing:
    enabled: false
    free-plan:
      name: 基础版
      daily-quota: 50000
    unpaid-plan:
      name: 未开通
    lemon-squeezy:
      webhook-secret: your-webhook-signing-secret
      allow-test-mode: true
    products:
      - variant-id: "123456"
        plan-name: 基础版
        daily-quota: 500000
        duration-days: 30
        label: 基础版（1个月）
        checkout-url: https://your-store.lemonsqueezy.com/checkout/buy/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx

spring:
  datasource:
    username: root
    password: your-mysql-password
