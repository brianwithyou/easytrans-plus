server:
  port: 9091

logging:
  level:
    com.brian.easytrans: INFO
    com.brian.easytrans.security.JwtAuthInterceptor: INFO
    com.brian.easytrans.integration.llm.LlmChatClient: INFO
    com.brian.easytrans.integration.llm.OpenAiCompatibleChatTransport: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{requestId}] %logger{36} - %msg%n"

spring:
  application:
    name: easytrans
  config:
    import: optional:classpath:application-local.yaml
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:mysql://localhost:3306/easytrans?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  mybatis-plus:
    configuration:
      map-underscore-to-camel-case: true
      log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    global-config:
      db-config:
        logic-not-delete-value: 0

app:
  jwt:
    secret: ${JWT_SECRET:}
    expire-hours: 24
    refresh-expire-hours: 720
  cors:
    allowed-origins: "*"
  llm:
    # 按顺序尝试，前一个失败/异常时自动兜底到下一个（未配置 api-key 的项会跳过）
    providers:
      - provider: dashscope
        api-key: ${DASHSCOPE_API_KEY:}
      - provider: mimo
        api-key: ${MIMO_API_KEY:}
      - provider: deepseek
        api-key: ${DEEPSEEK_API_KEY:}
  email:
    dev-mode: ${EMAIL_DEV_MODE:true}
    dev-code: ${EMAIL_DEV_CODE:123456}
    expire-minutes: 10
    resend-interval-seconds: 60
    daily-limit: 10
    resend:
      api-key: ${RESEND_API_KEY:}
      from: ${RESEND_FROM:EasyTrans <onboarding@resend.dev>}
  billing:
    enabled: ${BILLING_ENABLED:false}
    runtime-config-path: ${BILLING_RUNTIME_CONFIG_PATH:}
    free-plan:
      name: 基础版
      daily-quota: 50000
    unpaid-plan:
      name: 未开通
    lemon-squeezy:
      webhook-secret: ${LEMON_SQUEEZY_WEBHOOK_SECRET:}
      allow-test-mode: ${BILLING_ALLOW_TEST_MODE:true}
    products: []
