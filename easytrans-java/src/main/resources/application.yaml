server:
  port: 8080

logging:
  level:
    com.brian.easytrans: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{requestId}] %logger{36} - %msg%n"

spring:
  application:
    name: easytrans-api
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:mysql://localhost:3306/easytrans?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: admin@123
    driver-class-name: com.mysql.cj.jdbc.Driver
  mybatis-plus:
    configuration:
      map-underscore-to-camel-case: true
      log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    global-config:
      db-config:
        logic-not-delete-value: 0

app:
  jwt:
    secret: easytrans-pro-change-me-in-production-32chars-min
    expire-hours: 24
    refresh-expire-hours: 720
  cors:
    allowed-origins: "*"
  dashscope:
    api-key: ${DASHSCOPE_API_KEY:}
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    model: qwen-plus
