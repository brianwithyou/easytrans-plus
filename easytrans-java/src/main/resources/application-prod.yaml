spring:
  mybatis-plus:
    configuration:
      log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:*}
  email:
    dev-mode: ${EMAIL_DEV_MODE:false}
    resend:
      api-key: ${RESEND_API_KEY:}
      from: ${RESEND_FROM:}
  billing:
    enabled: ${BILLING_ENABLED:false}
    lemon-squeezy:
      webhook-secret: ${LEMON_SQUEEZY_WEBHOOK_SECRET:}
      allow-test-mode: ${BILLING_ALLOW_TEST_MODE:true}
