# 可选：由 compose 自带 MySQL（一般不需要，你已有 MySQL 8 容器时请忽略本文件）
# 用法: docker compose -f docker-compose.yml -f docker-compose.bundled-mysql.yml up -d --build

services:
  mysql:
    image: mysql:8.4
    container_name: easytrans-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD in .env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-easytrans}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - mysql_data:/var/lib/mysql
      - ../sql/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - mysql-net

  api:
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      SPRING_DATASOURCE_URL: >-
        jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-easytrans}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    networks:
      - mysql-net

networks:
  mysql-net:
    driver: bridge

volumes:
  mysql_data:
