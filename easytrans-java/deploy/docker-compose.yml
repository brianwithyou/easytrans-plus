services:
  mysql:
    image: mysql:8.4
    container_name: easytrans-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-easytrans}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - mysql_data:/var/lib/mysql
      - ../sql/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - easytrans-net

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: easytrans-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      TZ: Asia/Shanghai
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-easytrans}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      MIMO_API_KEY: ${MIMO_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-*}
    ports:
      - "${API_PORT:-9091}:9091"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9091/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - easytrans-net

volumes:
  mysql_data:

networks:
  easytrans-net:
    driver: bridge
