services:
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: easytrans-api
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      TZ: Asia/Shanghai
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      MYSQL_USERNAME: ${MYSQL_USERNAME:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD in .env}
      SPRING_DATASOURCE_URL: >-
        jdbc:mysql://${MYSQL_HOST:-host.docker.internal}:${MYSQL_PORT:-3306}/${MYSQL_DATABASE:-easytrans}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_MODEL: ${DASHSCOPE_MODEL:-qwen3.7-plus}
      MIMO_API_KEY: ${MIMO_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      EMAIL_DEV_MODE: ${EMAIL_DEV_MODE:-false}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-*}
      BILLING_ENABLED: ${BILLING_ENABLED:-false}
      LEMON_SQUEEZY_WEBHOOK_SECRET: ${LEMON_SQUEEZY_WEBHOOK_SECRET:-}
      BILLING_ALLOW_TEST_MODE: ${BILLING_ALLOW_TEST_MODE:-true}
      BILLING_VARIANT_ID: ${BILLING_VARIANT_ID:-}
      BILLING_PLAN_NAME: ${BILLING_PLAN_NAME:-基础版}
      BILLING_DAILY_QUOTA: ${BILLING_DAILY_QUOTA:-500000}
      BILLING_DURATION_DAYS: ${BILLING_DURATION_DAYS:-30}
      BILLING_PRODUCT_LABEL: ${BILLING_PRODUCT_LABEL:-基础版（1个月）}
      BILLING_CHECKOUT_URL: ${BILLING_CHECKOUT_URL:-}
      BILLING_RUNTIME_CONFIG_PATH: ${BILLING_RUNTIME_CONFIG_PATH:-/app/config/runtime.env}
    volumes:
      - ./.env:/app/config/runtime.env:ro
    ports:
      - "${API_PORT:-9091}:9091"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9091/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
